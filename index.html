<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header">
        <i class="fa-solid fa-shield-halved"></i> Spam Detector 
        <span class="badge">Accurate & Fast</span>
    </div>

    <div class="main-container">
        <h1>Email Spam Classification</h1>
        <p class="subtitle">Analyze your message instantly</p>

        <div class="input-section">
            <textarea id="messageInput" placeholder="Type or paste your message here..." maxlength="500"></textarea>
            <div class="char-count"><span id="currentCount">0</span> / 500 characters</div>
        </div>

        <button id="analyzeBtn" onclick="analyzeMessage()">
            <i class="fa-solid fa-magnifying-glass"></i> Analyze Message
        </button>

        <div id="resultContainer" class="result-box hidden">
            <div class="result-header">
                <i id="resultIcon" class="fa-solid"></i>
                <h2 id="resultLabel">Result: </h2>
            </div>
            <p id="resultProb">Probability: </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
